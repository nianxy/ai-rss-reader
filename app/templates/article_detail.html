<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ article.title }}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
  <main class="page">
    <article class="card">
      <h1 class="page-title">{{ article.title }}</h1>
      <div class="meta">来源：{{ article.source_name }} | 抓取时间：{{ article.created_at }}</div>

      <h3 class="section-title">简短摘要</h3>
      <p>{{ article.summary_short }}</p>

      <h3 class="section-title">重点内容总结</h3>
      <div>{{ article.summary_keypoints | safe }}</div>

      <h3 class="section-title">原文</h3>
      <p><a href="{{ article.link }}" target="_blank" rel="noreferrer">打开原文链接</a></p>
    </article>
  </main>
</body>
</html>
