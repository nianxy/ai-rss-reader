<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>{{ digest_date }} RSS汇总</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; line-height: 1.6; color: #111;">
  <h1>{{ digest_date }} RSS汇总</h1>
  {% for category in payload %}
    <h2>{{ category.category_name }}</h2>
    <ul>
      {% for a in category.articles %}
      <li style="margin-bottom: 12px;">
        <a href="{{ base_url }}/go/{{ a.id }}" target="_blank" rel="noreferrer">{{ a.title }}</a>
        <div>{{ a.summary_short }}</div>
        <div>来源: {{ a.sources | join('、') }}</div>
      </li>
      {% endfor %}
    </ul>
  {% endfor %}
</body>
</html>
