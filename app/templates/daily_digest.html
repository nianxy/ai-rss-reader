<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ digest_date }} RSS汇总</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="page-title">{{ digest_date }} RSS汇总</h1>
      {% for category in payload %}
        <h2 class="section-title">{{ category.category_name }}</h2>
        <ul class="digest-list">
          {% for a in category.articles %}
          <li>
            <a href="{{ base_url }}/go/{{ a.id }}" target="_blank" rel="noreferrer">{{ a.title }}</a>
            <div class="summary">{{ a.summary_short }}</div>
            <div class="meta">来源: {{ a.sources | join('、') }}</div>
          </li>
          {% endfor %}
        </ul>
      {% endfor %}
    </section>
  </main>
</body>
</html>
